services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recharge
      POSTGRES_PASSWORD: recharge
      POSTGRES_DB: recharge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@recharge.ro
      PGADMIN_DEFAULT_PASSWORD: recharge
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
